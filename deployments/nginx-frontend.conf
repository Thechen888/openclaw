server {
    listen 80;
    server_name _;

    # Frontend served under /openclaw/ prefix (static files only, mock mode)
    location /openclaw/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /openclaw/index.html;
    }

    # Redirect bare /openclaw to /openclaw/
    location = /openclaw {
        return 301 /openclaw/;
    }

    # Cache static assets
    location ~* /openclaw/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        alias /usr/share/nginx/html/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
