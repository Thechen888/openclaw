server:
  port: 8000
  host: "0.0.0.0"
  read_timeout: 30s
  write_timeout: 30s

database:
  driver: "sqlite"  # sqlite for dev, postgres for production
  dsn: "openclaw.db"
  max_open_conns: 25
  max_idle_conns: 10
  auto_migrate: true

auth:
  user_jwt_secret: "openclaw-user-jwt-secret-change-in-production"
  admin_jwt_secret: "openclaw-admin-jwt-secret-change-in-production"
  access_token_ttl: 24h
  refresh_token_ttl: 168h

gateway:
  health_check_interval: 60s
  default_timeout: 30s
  circuit_breaker_threshold: 5
  circuit_breaker_timeout: 60s

agent:
  worker_pool_size: 10
  max_recursion_depth: 3
  cron_timezone: "Asia/Shanghai"

matcher:
  run_interval: 6h
  auto_threshold: 0.90
  pending_threshold: 0.70

starlark:
  max_steps: 100000
  max_memory_mb: 64
  timeout: 30s

logging:
  level: "info"
  format: "json"

k8s:
  namespace: "openclaw"
  in_cluster: false
